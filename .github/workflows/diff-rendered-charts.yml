# Reusable workflow to render and diff helm charts between the head and base ref of a pull request
# The diff output is posted as a job summary

name: render and diff helm charts
on:
  workflow_call:

jobs:
  get_changed_helm_charts:
    runs-on: ubuntu-latest
    outputs:
      matrix_charts: ${{ steps.find_changed_charts.outputs.matrix_changed_charts }}
      charts: ${{ steps.find_changed_charts.outputs.changed_charts }}
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
         fetch-depth: '100'
         persist-credentials: true # We are using these credentials in later steps

      - name: find changed helm charts
        id: find_changed_charts
        run: |
          git fetch origin ${GITHUB_BASE_REF}:${GITHUB_BASE_REF}
          echo matrix_changed_charts=$(git diff --name-only ${GITHUB_BASE_REF}...HEAD -- '**/k8s/**/*.yaml' '**/k8s/**/*.yml' '**/k8s/**/*.tpl' '**/k8s/**/*.tmpl' | cut -d'/' -f1,2,3 | uniq | jq -R 'split("\n")' | jq -s 'flatten(1)') >> $GITHUB_OUTPUT
          echo changed_charts=$(git diff --name-only ${GITHUB_BASE_REF}...HEAD -- '**/k8s/**/*.yaml' '**/k8s/**/*.yml' '**/k8s/**/*.tpl' '**/k8s/**/*.tmpl' | cut -d'/' -f1,2,3 | uniq) >> $GITHUB_OUTPUT
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}

  render_charts:
    runs-on: ubuntu-latest
    needs: get_changed_helm_charts
    strategy:
      matrix:
        chart: ${{ fromJSON(needs.get_changed_helm_charts.outputs.matrix_charts) }}
        ref:
          - name: base
            sha: ${{ github.base_ref }}
          - name: head
            sha: ${{ github.head_ref }}
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: true # We are using these credentials in later steps
          ref: ${{ matrix.ref.sha }}

      - name: setup helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 #v4.3.1

      - name: render ${{ matrix.chart }} from ${{ matrix.ref.name }} ref
        id: render
        run: |
          mkdir -p shared/${MATRIX_REF_NAME}-charts
          if [ -f "${MATRIX_CHART}/Chart.yaml" ]; then
            helm dependency update "${MATRIX_CHART}"
            values_files=$(find "$MATRIX_CHART" -maxdepth 1 -type f \( -name '*values*.yaml' -o -name '*values*.yml' \) ! \( -name 'values.yaml' -o -name 'values.yml' \))

            for values_path in ${values_files}; do
              values_file=$(basename "$values_path")
              env=$(echo "$values_file" | sed -E 's/^values-([a-z0-9]+)(-.+)?\.yaml$/\1/')
              region=$(echo "$values_file" | sed -nE "s/^values-${env}-(.+)\.yaml$/\1/p")

              output_name=$(basename "$values_file" .yaml)
              render_path="shared/${MATRIX_REF_NAME}-charts/${MATRIX_CHART}/${output_name}"
              mkdir -p "$render_path"

              if [[ -n "$region" && -f "${MATRIX_CHART}/values-${env}.yaml" ]]; then
                # Render with three layers: base, env, env-region
                helm template "${MATRIX_CHART}" \
                  -f "${MATRIX_CHART}/values.yaml" \
                  -f "${MATRIX_CHART}/values-${env}.yaml" \
                  -f "${MATRIX_CHART}/${values_file}" \
                  --output-dir "$render_path"
              else
                # Only base + environment file
                helm template "${MATRIX_CHART}" \
                  -f "${MATRIX_CHART}/values.yaml" \
                  -f "${MATRIX_CHART}/${values_file}" \
                  --output-dir "$render_path"
              fi
           done
          fi
          echo sanitized_name=$(echo "${MATRIX_CHART}" | sed 's/\//-/g') >> $GITHUB_OUTPUT
        env:
          MATRIX_CHART: ${{ matrix.chart }}
          MATRIX_REF_NAME: ${{ matrix.ref.name }}

      - name: upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: "shared-${{ matrix.ref.name }}-${{ steps.render.outputs.sanitized_name }}"
          path: "shared"

  diff_helm_charts:
    runs-on: ubuntu-latest
    needs:
      - get_changed_helm_charts
      - render_charts
    steps:
      - name: setup helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 #v4.3.1

      - name: download artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 #v8.0.0
        with:
          pattern: shared-*
          merge-multiple: true
          path: "shared"

      - name: diff helm charts
        id: diff_helm_charts
        run: |
          for chart in ${CHARTS}; do
            chart_diff_output=$(diff -r "shared/base-charts/${chart}" "shared/head-charts/${chart}" || true)
            if [ -n "$chart_diff_output" ]; then
              echo -e "Changes found in chart: ${chart}\n$(diff -ruN shared/base-charts/${chart} shared/head-charts/${chart})\n" >> diff.log
            fi
          done
        env:
          CHARTS: ${{ needs.get_changed_helm_charts.outputs.charts }}
      - name: classify diff
        id: classify_diff
        if: needs.get_changed_helm_charts.outputs.charts != ''
        run: |
          if [ ! -f diff.log ]; then
            echo "diff.log not found"
            exit 0
          fi
          max_size=$((1024 * 1024))
          comment_limit=65000
          file_size=$(stat --format=%s diff.log)
          if [ "$file_size" -gt "$max_size" ]; then
            echo "diff_too_large=true" >> "$GITHUB_OUTPUT"
            echo "diff_fits_in_comment=false" >> "$GITHUB_OUTPUT"
          else
            echo "diff_too_large=false" >> "$GITHUB_OUTPUT"
            if [ "$file_size" -le "$comment_limit" ]; then
              echo "diff_fits_in_comment=true" >> "$GITHUB_OUTPUT"
            else
              echo "diff_fits_in_comment=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: post diff as comment
        if: steps.classify_diff.outputs.diff_fits_in_comment == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          {
            echo "Helm chart changes detected."
            echo ""
            echo "<details><summary>Show Diff</summary>"
            echo ""
            echo '```diff'
            cat diff.log
            echo '```'
            echo ""
            echo "</details>"
          } > comment_body.txt
          gh pr comment "$PR_NUMBER" --body-file comment_body.txt
          echo "Changes found in Helm charts." >> "$GITHUB_STEP_SUMMARY"
          echo '<details><summary>Show Output</summary>' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```diff' >> "$GITHUB_STEP_SUMMARY"
          cat diff.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo '</details>' >> "$GITHUB_STEP_SUMMARY"

      - name: post diff as job summary
        if: steps.classify_diff.outputs.diff_fits_in_comment == 'false' && steps.classify_diff.outputs.diff_too_large == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          echo "Changes found in Helm charts." >> "$GITHUB_STEP_SUMMARY"
          echo '<details><summary>Show Output</summary>' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```diff' >> "$GITHUB_STEP_SUMMARY"
          cat diff.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo '</details>' >> "$GITHUB_STEP_SUMMARY"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh pr comment "$PR_NUMBER" --body "Helm chart changes detected. View the diff in the [job summary](${run_url})."

      - name: upload diff artifact
        id: upload_artifact
        if: steps.classify_diff.outputs.diff_too_large == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f #v6.0.0
        with:
          name: helm-diff
          path: diff.log

      - name: post artifact link
        if: steps.classify_diff.outputs.diff_too_large == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.number }}
          ARTIFACT_URL: ${{ steps.upload_artifact.outputs.artifact-url }}
        run: |
          echo "Changes found in Helm charts." >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo "Diff output exceeds 1MiB and is too large to display inline. [Download the helm-diff artifact](${ARTIFACT_URL}) to view the full diff." >> "$GITHUB_STEP_SUMMARY"
          gh pr comment "$PR_NUMBER" --body "Helm chart changes detected. The diff is too large to display inline. [Download the helm-diff artifact](${ARTIFACT_URL}) to view the full diff."
